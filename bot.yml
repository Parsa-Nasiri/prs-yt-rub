name: Rubika YouTube Bot

on:
  # Run on push to main branch
  push:
    branches: [main]

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Auto-restart every 5 hours 50 minutes
  # (GitHub Actions kills jobs after 6 hours — we beat it to the punch 😎)
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    name: 🤖 Run Rubika Bot
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h 50m — safely under the 6h GitHub limit

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install system dependencies (ffmpeg for video merging) ─────────
      - name: 🎬 Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      # ── 4. Install Python packages ────────────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run the bot ────────────────────────────────────────────────────
      - name: 🚀 Run bot
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
        run: python bot.py
