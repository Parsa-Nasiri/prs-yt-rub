name: Rubika Multi-Tool Bot

on:
  # ── Manual trigger ─────────────────────────────────────────
  workflow_dispatch:

  # ── Auto-start on push to main branch ──────────────────────
  push:
    branches: [main, master]

  # ── Safety-net cron: every 5h 30m (well before 6h hard limit)
  # Primary restart is handled by the in-bot watchdog.
  # This cron is a fallback in case the watchdog fails.
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-bot:
    name: 🤖 Run Rubika Bot
    runs-on: ubuntu-latest
    timeout-minutes: 355   # 5h 55m — hard kill before GitHub's 6h limit

    # Allow only ONE bot instance at a time.
    # cancel-in-progress: true so a new dispatch immediately replaces the old one.
    concurrency:
      group: bot-runner
      cancel-in-progress: true

    env:
      BOT_TOKEN:            ${{ secrets.BOT_TOKEN }}
      GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY:    ${{ github.repository }}
      GITHUB_BRANCH:        ${{ github.ref_name }}
      GITHUB_WORKFLOW_FILE: bot.yml
      ADMIN_IDS:            ${{ secrets.ADMIN_IDS }}
      CONFIG_CHANNELS:      ${{ secrets.CONFIG_CHANNELS }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install system dependencies ────────────────────
      # Notes on Ubuntu 24.04 (Noble) package renames:
      #   libasound2   → libasound2t64
      #   libxss1      → removed; provided by libx11-6 / not needed separately
      # playwright install --with-deps handles its own Chromium deps,
      # so we only need ffmpeg here (required by yt-dlp for merging streams).
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # ── 4. Install Python dependencies ────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Install Playwright + all its Chromium deps ─────
      # --with-deps is the correct single command; it installs
      # the browser AND all OS-level dependencies automatically,
      # handling Ubuntu 24.04 package renames internally.
      - name: 🌐 Install Playwright Chromium
        run: playwright install --with-deps chromium

      # ── 6. Restore SQLite DB from cache (persists data) ───
      - name: 💾 Restore database cache
        uses: actions/cache@v4
        with:
          path: bot_data.db
          key: rubika-bot-db-${{ github.ref_name }}
          restore-keys: rubika-bot-db-

      # ── 7. Run the bot ─────────────────────────────────────
      - name: 🚀 Start Bot
        run: python main.py

      # ── 8. Save DB to cache after bot stops ────────────────
      - name: 💾 Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bot_data.db
          key: rubika-bot-db-${{ github.ref_name }}-${{ github.run_id }}
